name: Sync Report Studio No Market V8

on:
  push:
    paths:
      - '.github/workflows/sync-report-studio-no-market-v8.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Report Studio export version
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('pages/report_studio.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('NO_MARKET_EXPORT_VERSION = "no_market_metric_v7"', 'NO_MARKET_EXPORT_VERSION = "no_market_metric_v8"')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/report_studio.py
          git diff --cached --quiet && exit 0
          git commit -m "Sync Report Studio no-market export version"
          git push
