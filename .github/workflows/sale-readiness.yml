name: Sale Readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  magazine-report-gate:
    name: Magazine and report gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      PYTHONUNBUFFERED: '1'
      STREAMLIT_SERVER_HEADLESS: 'true'
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile critical magazine files
        run: python -m py_compile autonomous_betting_agent/magazine_api_sources.py autonomous_betting_agent/magazine_live_api_enrichment.py pages/report_studio.py

      - name: Magazine API display regression
        run: python -m pytest -q tests/test_magazine_api_sources_display.py

      - name: Report Studio regression check
        run: python -m scripts.report_studio_regression_check

      - name: Magazine autofit stress test
        run: python scripts/magazine_autofit_stress_test.py

      - name: Full test suite
        run: |
          set +e
          python -m pytest -q 2>&1 | tee pytest-output.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo '--- pytest failure tail ---'
            tail -n 120 pytest-output.log
            python - <<'PY'
          from pathlib import Path
          import re

          log = Path('pytest-output.log').read_text(encoding='utf-8', errors='replace')
          failed = re.findall(r'^(tests/[^\s]+)::([^\s]+)\s+FAILED', log, flags=re.MULTILINE)
          if failed:
              summary = '; '.join(f'{path}::{name}' for path, name in failed[:20])
          else:
              lines = [line for line in log.splitlines() if 'FAILED' in line or 'ERROR' in line or 'AssertionError' in line or 'ImportError' in line or 'ModuleNotFoundError' in line]
              summary = ' | '.join(lines[-20:]) if lines else 'pytest failed; inspect pytest failure tail'
          annotation = summary.replace('%', '%25').replace('\n', '%0A').replace('\r', '%0D')
          Path('pytest-failure-summary.txt').write_text(summary + '\n\n--- tail ---\n' + '\n'.join(log.splitlines()[-120:]), encoding='utf-8')
          print(f'::error title=pytest failed::{annotation}')
          PY
            exit "$status"
          fi

      - name: Upload pytest failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-diagnostics
          path: |
            pytest-output.log
            pytest-failure-summary.txt
          if-no-files-found: warn
