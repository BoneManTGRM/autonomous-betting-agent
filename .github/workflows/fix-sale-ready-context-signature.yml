name: Fix Sale Ready Context Signature

on:
  push:
    paths:
      - '.github/workflows/fix-sale-ready-context-signature.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch context signature
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('autonomous_betting_agent/magazine_sale_ready_patch.py')
          s = p.read_text(encoding='utf-8')
          old = 'def _items_from_context(row: Any, keys: Iterable[str], fallback: list[str], limit: int) -> list[str]:'
          new = 'def _items_from_context(row: Any, keys: Iterable[str], fallback: list[str], limit: int, lang: str = "en") -> list[str]:'
          if old not in s:
              raise SystemExit('signature target not found')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add autonomous_betting_agent/magazine_sale_ready_patch.py
          git diff --cached --quiet && exit 0
          git commit -m "Fix sale ready context signature"
          git push
