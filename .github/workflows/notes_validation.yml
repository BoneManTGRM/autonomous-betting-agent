name: Notes Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'autonomous_betting_agent/chain_notes.py'
      - 'autonomous_betting_agent/cn_patch.py'
      - 'scripts/chain_combo_smoke_test.py'
      - 'scripts/chain_betting_smoke_test.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile
        run: python -m py_compile autonomous_betting_agent/chain_notes.py autonomous_betting_agent/cn_patch.py scripts/chain_combo_smoke_test.py scripts/chain_betting_smoke_test.py
      - name: Smoke
        run: |
          python -m scripts.chain_combo_smoke_test
          python -m scripts.chain_betting_smoke_test
